<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Project that showcase the use of grid by building a color palette">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Assignment Grid</title>
</head>
<body>
    <div class="grid_container">   <!--first row left corner-->
        <div class="grid_item first">
            <div class="grid_element box-1"></div>
            <div class="grid_element box-2"></div>
        </div>

        <div class="grid_item second"></div> <!--first row middle-->

        <div class="grid_item third">   <!--first row right corner-->
            <div class="grid_element box-3"></div>
            <div class="grid_element box-4"></div>
            <div class="grid_element box-5"></div>
        </div>

        <div class="grid_item forth"></div> <!--second row right corner-->

        <div class="grid_item fifth">
            <div class="grid_element box_6"></div>
            <div class="grid_element box_7"></div>
        </div>

        <div class="grid_item sixth"></div>

        <div class="grid_item seventh"></div>
        
        <div class="grid_item eighth"><p>MY COLOR PALETTE</p></div>
    </div>

    
</body>

    
</html>
